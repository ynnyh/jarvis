name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: windows-latest
            platform_id: windows-x86_64
          - os: macos-latest
            platform_id: darwin-aarch64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Swatinem/rust-cache 智能处理 Cargo.lock 变化：jarvis crate 自己版本号变了不会
      # invalidate 所有依赖，比手写 actions/cache 友好很多
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      # bundled/node.exe 和 macOS node 二进制版本固定（由 fetch-node.mjs 决定），
      # 不应每次都从 nodejs.org 重下 ~80MB，按脚本 hash 缓存
      - name: Cache bundled runtime
        uses: actions/cache@v4
        with:
          path: src-tauri/bundled
          key: ${{ runner.os }}-bundled-${{ hashFiles('scripts/fetch-node.mjs') }}

      - name: Install npm deps
        run: npm ci --no-audit --no-fund
        timeout-minutes: 5

      - name: Prebuild (bundle daemon + fetch node)
        run: npm run desktop:prebuild
        timeout-minutes: 8

      - name: Build Tauri (NSIS / DMG + updater artifacts)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build
        timeout-minutes: 25

      - name: Stage artifacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p staging
          # Windows: NSIS installer 同时也是 updater 目标，sig 直接在 nsis/ 下
          cp src-tauri/target/release/bundle/nsis/*-setup.exe staging/
          cp src-tauri/target/release/bundle/nsis/*-setup.exe.sig staging/
          echo "${{ matrix.platform_id }}" > staging/PLATFORM_ID
          ls -la staging/

      - name: Stage artifacts (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          set -e
          mkdir -p staging
          BUNDLE=src-tauri/target/release/bundle
          # 动态找 updater sig（可能在 macos/ / updater/ / 任意子目录）
          SIG=$(find "$BUNDLE" -name "*.sig" | head -1)
          if [ -z "$SIG" ]; then
            echo "❌ 找不到任何 .sig 文件 —— updater artifact 没生成"
            echo "=== bundle/ tree（诊断用） ==="
            find "$BUNDLE" -maxdepth 4 \( -type f -o -type d \) | sort
            exit 1
          fi
          TARGET="${SIG%.sig}"
          if [ ! -f "$TARGET" ]; then
            echo "❌ 找到 sig=$SIG 但对应 target $TARGET 不存在"
            exit 1
          fi
          cp "$SIG" "$TARGET" staging/
          # DMG 是用户下载入口，找到就一起上传
          DMG=$(find "$BUNDLE" -name "*.dmg" | head -1)
          if [ -n "$DMG" ]; then
            cp "$DMG" staging/
          else
            echo "⚠ 没找到 .dmg —— 用户只能走 .app.tar.gz 手动展开"
          fi
          echo "${{ matrix.platform_id }}" > staging/PLATFORM_ID
          ls -la staging/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-${{ matrix.platform_id }}-${{ github.ref_name }}
          path: staging/*
          retention-days: 14

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm deps (for undici)
        run: npm ci --no-audit --no-fund
        timeout-minutes: 5

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: jarvis-*-${{ github.ref_name }}

      - name: List artifacts
        run: ls -R artifacts/

      - name: Publish to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: ynnyh
          GITEE_REPO: jarvis
          RELEASE_NOTES: ${{ github.event.head_commit.message }}
          ARTIFACTS_DIR: artifacts
        run: node scripts/publish-to-gitee.mjs
        timeout-minutes: 45
