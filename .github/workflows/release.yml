name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      # Do not cancel Windows just because macOS failed, or vice versa.
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform_id: windows-x86_64
            artifact_id: windows-x86_64
          - os: macos-latest
            # Build one Universal macOS artifact and expose it to the updater
            # under both runtime platform ids.
            platform_id: darwin-aarch64,darwin-x86_64
            artifact_id: darwin-universal
            tauri_args: --target universal-apple-darwin

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    env:
      HAS_APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS universal Rust targets
        if: matrix.os == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install npm deps
        run: npm ci --no-audit --no-fund
        timeout-minutes: 5

      - name: Check text encoding
        run: npm run check:text

      - name: Verify version consistency (Cargo.toml == tauri.conf.json)
        shell: bash
        run: |
          set -euo pipefail
          cargo_ver=$(grep -m1 '^version' src-tauri/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          tauri_ver=$(grep -m1 '"version"' src-tauri/tauri.conf.json | sed 's/.*: *"\(.*\)".*/\1/')
          echo "Cargo.toml:  $cargo_ver"
          echo "tauri.conf.json: $tauri_ver"
          if [ "$cargo_ver" != "$tauri_ver" ]; then
            echo "❌ 版本不一致！Cargo.toml=$cargo_ver vs tauri.conf.json=$tauri_ver"
            echo "   请同步两个文件的版本号后再发版。"
            exit 1
          fi
          echo "✓ 版本一致"

      - name: Verify updater signing key
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_B64: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_B64 }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: node scripts/ci/prepare-tauri-signing.mjs

      - name: Import Apple Developer certificate
        if: matrix.os == 'macos-latest' && env.HAS_APPLE_CERTIFICATE == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain
          CERT_ID=$(security find-identity -v -p codesigning build.keychain | awk -F'"' '/Developer ID Application/ { print $2; exit }')
          if [ -z "$CERT_ID" ]; then
            CERT_ID=$(security find-identity -v -p codesigning build.keychain | awk -F'"' '/"[^"]+"/ { print $2; exit }')
          fi
          if [ -z "$CERT_ID" ]; then
            echo "❌ 没找到可用的 macOS code signing identity"
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"

      - name: Use ad-hoc macOS signing fallback
        if: matrix.os == 'macos-latest' && env.HAS_APPLE_CERTIFICATE != 'true'
        shell: bash
        run: |
          echo "APPLE_SIGNING_IDENTITY=-" >> "$GITHUB_ENV"
          echo "⚠ 未配置 Apple 证书，使用 ad-hoc 签名。Apple Silicon 可运行性会更好，但浏览器下载后仍可能需要在系统设置里手动允许。"

      - name: Configure macOS signing identity
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('node:fs')
          const file = 'src-tauri/tauri.conf.json'
          const conf = JSON.parse(fs.readFileSync(file, 'utf8'))
          conf.bundle ||= {}
          conf.bundle.macOS ||= {}
          conf.bundle.macOS.signingIdentity = process.env.APPLE_SIGNING_IDENTITY || '-'
          fs.writeFileSync(file, JSON.stringify(conf, null, 2) + '\n')
          NODE

      - name: Build Tauri (NSIS / DMG + updater artifacts)
        if: matrix.os != 'macos-latest' || env.HAS_APPLE_CERTIFICATE != 'true'
        env:
          TAURI_SIGNING_PRIVATE_KEY_PATH: .tauri-ci/updater-private.key
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build ${{ matrix.tauri_args }}
        timeout-minutes: 50

      - name: Build Tauri with Apple notarization
        if: matrix.os == 'macos-latest' && env.HAS_APPLE_CERTIFICATE == 'true'
        env:
          TAURI_SIGNING_PRIVATE_KEY_PATH: .tauri-ci/updater-private.key
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx tauri build ${{ matrix.tauri_args }}
        timeout-minutes: 50

      - name: Stage artifacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p staging
          # Windows: NSIS installer 同时也是 updater 目标，sig 直接在 nsis/ 下
          cp src-tauri/target/release/bundle/nsis/*-setup.exe staging/
          cp src-tauri/target/release/bundle/nsis/*-setup.exe.sig staging/
          echo "${{ matrix.platform_id }}" > staging/PLATFORM_ID
          ls -la staging/

      - name: Stage artifacts (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          set -e
          mkdir -p staging
          BUNDLE=src-tauri/target/universal-apple-darwin/release/bundle
          # 动态找 updater sig（可能在 macos/ / updater/ / 任意子目录）
          SIG=$(find "$BUNDLE" -name "*.sig" | head -1)
          if [ -z "$SIG" ]; then
            echo "❌ 找不到任何 .sig 文件 —— updater artifact 没生成"
            echo "=== bundle/ tree（诊断用） ==="
            find "$BUNDLE" -maxdepth 4 \( -type f -o -type d \) | sort
            exit 1
          fi
          TARGET="${SIG%.sig}"
          if [ ! -f "$TARGET" ]; then
            echo "❌ 找到 sig=$SIG 但对应 target $TARGET 不存在"
            exit 1
          fi
          cp "$SIG" "$TARGET" staging/
          # DMG 是用户下载入口，找到就一起上传
          DMG=$(find "$BUNDLE" -name "*.dmg" -not -name ".*" | head -1)
          if [ -n "$DMG" ]; then
            cp "$DMG" staging/
          else
            echo "⚠ 没找到 .dmg —— 用户只能走 .app.tar.gz 手动展开"
          fi
          echo "${{ matrix.platform_id }}" > staging/PLATFORM_ID
          ls -la staging/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-${{ matrix.artifact_id }}-${{ github.ref_name }}
          path: staging/*
          retention-days: 14

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm deps (for undici)
        run: npm ci --no-audit --no-fund
        timeout-minutes: 5

      - name: Check text encoding
        run: npm run check:text

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: jarvis-*-${{ github.ref_name }}

      - name: List artifacts
        run: ls -R artifacts/

      - name: Publish to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: ynnyh
          GITEE_REPO: jarvis
          RELEASE_NOTES: ${{ github.event.head_commit.message }}
          ARTIFACTS_DIR: artifacts
        run: node scripts/publish-to-gitee.mjs
        timeout-minutes: 45
