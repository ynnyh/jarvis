name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform_id: windows-x86_64
          - os: macos-latest
            platform_id: darwin-aarch64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install npm deps
        run: npm ci

      - name: Prebuild (bundle daemon + fetch node)
        run: npm run desktop:prebuild

      - name: Build Tauri (NSIS / DMG + updater artifacts)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build

      - name: Stage artifacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p staging
          # Windows: NSIS installer 同时也是 updater 目标，sig 直接在 nsis/ 下
          cp src-tauri/target/release/bundle/nsis/*-setup.exe staging/
          cp src-tauri/target/release/bundle/nsis/*-setup.exe.sig staging/
          echo "${{ matrix.platform_id }}" > staging/PLATFORM_ID
          ls -la staging/

      - name: Stage artifacts (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          mkdir -p staging
          # macOS：DMG 给人下载，.app.tar.gz + .sig 给 tauri-plugin-updater
          cp src-tauri/target/release/bundle/dmg/*.dmg staging/
          cp src-tauri/target/release/bundle/macos/*.app.tar.gz staging/
          cp src-tauri/target/release/bundle/macos/*.app.tar.gz.sig staging/
          echo "${{ matrix.platform_id }}" > staging/PLATFORM_ID
          ls -la staging/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-${{ matrix.platform_id }}-${{ github.ref_name }}
          path: staging/*
          retention-days: 14

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: jarvis-*-${{ github.ref_name }}

      - name: List artifacts
        run: ls -R artifacts/

      - name: Publish to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: ynnyh
          GITEE_REPO: jarvis
          RELEASE_NOTES: ${{ github.event.head_commit.message }}
          ARTIFACTS_DIR: artifacts
        run: node scripts/publish-to-gitee.mjs
