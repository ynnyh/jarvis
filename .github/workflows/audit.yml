name: Dependency Audit

# 定期依赖漏洞扫描，不阻断主开发流。
# 每周一扫描 + 手动触发。npm audit 用官方 registry（镜像源不支持 audit 端点）。
on:
  schedule:
    - cron: '0 3 * * 1'  # 每周一 11:00 (UTC+8) 扫描
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'  # 用官方源跑 audit

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm deps
        run: npm ci --no-audit --no-fund
        env:
          # 安装阶段仍走默认源（含镜像），避免装包慢
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # —— npm 生产依赖审计（阻断） ——
      # 只审计运行时依赖（--omit=dev）。桌面应用打包只含生产依赖，
      # 生产路径必须 0 高危漏洞。
      - name: npm audit production deps (blocking)
        run: npm audit --omit=dev --audit-level=high
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # —— npm 全量审计（含 devDependencies，仅报告不阻断） ——
      # vitepress 1.x 锁死 vite 5.x，其 dev-server 漏洞（path traversal / fs.deny）
      # 仅影响本地 docs:dev，不影响打包产物和线上静态站点。
      # 待 vitepress 2.0 稳定后可消除。详见 SECURITY.md。
      - name: npm audit all deps (report only)
        run: npm audit --audit-level=high || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # —— cargo 依赖审计 ——
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit
        run: cargo audit --file src-tauri/Cargo.lock
