[package]
name = "jarvis"
version = "0.6.3"
description = "Jarvis Desktop AI Assistant"
authors = ["you"]
license = ""
repository = ""
edition = "2021"
rust-version = "1.77.2"

[lib]
name = "jarvis_lib"
crate-type = ["rlib"]

[build-dependencies]
tauri-build = { version = "2.6.1", features = [] }

[dependencies]
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
log = "0.4"
tauri = { version = "2.11.1", features = ["macos-private-api", "tray-icon"] }
tauri-plugin-log = "2"
tauri-plugin-notification = "2"
tauri-plugin-updater = "2"
tauri-plugin-process = "2"
chrono = { version = "0.4", features = ["serde"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "cookies", "socks"] }
tokio = { version = "1", features = ["sync", "time", "process", "rt", "macros"] }
once_cell = "1"
keyring = { version = "3", features = ["windows-native", "apple-native", "linux-native-sync-persistent"] }
rfd = "0.15"
md-5 = "0.10"
hex = "0.4"
urlencoding = "2.1"
rusqlite = { version = "0.32", features = ["bundled"] }
regex = "1"
futures-util = "0.3"
tokio-tungstenite = { version = "0.24", features = ["rustls-tls-webpki-roots"] }

# 非 Windows 平台需要 libc::kill 来检测 daemon 进程存活
# Windows 走 tasklist，不需要 libc
[target.'cfg(not(windows))'.dependencies]
libc = "0.2"
