version: 2.1

orbs:
  win: circleci/windows@5

parameters:
  run_release:
    type: boolean
    default: false

commands:
  setup_rust:
    steps:
      - run:
          name: Install Rust
          command: |
            curl https://sh.rustup.rs -sSf | sh -s -- -y
            echo 'export PATH="$HOME/.cargo/bin:$PATH"' >> "$BASH_ENV"

jobs:
  build-windows:
    executor:
      name: win/default
      size: large
    steps:
      - checkout
      - restore_cache:
          keys:
            - win-node-20.19.0
      - run:
          name: Install Node.js 20.19.0
          command: |
            $nodeDir = "$env:USERPROFILE\node\node-v20.19.0-win-x64"
            if (Test-Path "$nodeDir\node.exe") {
              Write-Host "Node.js already installed, skipping download"
            } else {
              $nodeVersion = "20.19.0"
              $zip = "node-v$nodeVersion-win-x64.zip"
              Invoke-WebRequest -Uri "https://nodejs.org/dist/v$nodeVersion/$zip" -OutFile $zip
              Expand-Archive -Path $zip -DestinationPath "$env:USERPROFILE\node" -Force
            }
            $env:PATH="$nodeDir;$env:PATH"
            [Environment]::SetEnvironmentVariable("PATH", "$nodeDir;$env:PATH", "User")
            node --version
            npm --version
      - save_cache:
          key: win-node-20.19.0
          paths:
            - ~/node
      - restore_cache:
          keys:
            - win-rustup-v1
      - run:
          name: Install Rust
          command: |
            if (Test-Path "$env:USERPROFILE\.cargo\bin\rustc.exe") {
              Write-Host "Rust already installed, skipping"
            } else {
              Invoke-WebRequest -Uri https://win.rustup.rs/x86_64 -OutFile rustup-init.exe
              .\rustup-init.exe -y
            }
      - save_cache:
          key: win-rustup-v1
          paths:
            - ~/.cargo
            - ~/.rustup
      - restore_cache:
          keys:
            - win-npm-{{ checksum "package-lock.json" }}
            - win-npm-
      - run:
          name: Install dependencies
          command: |
            $nodeDir = "$env:USERPROFILE\node\node-v20.19.0-win-x64"
            $env:PATH="$nodeDir;$env:PATH"
            npm ci --no-audit --no-fund
      - run:
          name: Check text encoding
          command: |
            $nodeDir = "$env:USERPROFILE\node\node-v20.19.0-win-x64"
            $env:PATH="$nodeDir;$env:PATH"
            npm run check:text
      - save_cache:
          key: win-npm-{{ checksum "package-lock.json" }}
          paths:
            - node_modules
      - run:
          name: Verify updater signing key
          command: |
            $nodeDir = "$env:USERPROFILE\node\node-v20.19.0-win-x64"
            $env:PATH="$nodeDir;$env:PATH"
            node scripts/ci/prepare-tauri-signing.mjs
      - restore_cache:
          keys:
            - win-cargo-target-v2-{{ checksum "src-tauri/Cargo.lock" }}
            - win-cargo-target-v2-
      - run:
          name: Build Windows installer
          no_output_timeout: 30m
          command: |
            $nodeDir = "$env:USERPROFILE\node\node-v20.19.0-win-x64"
            $env:PATH="$env:USERPROFILE\.cargo\bin;$env:PATH"
            $env:PATH="$nodeDir;$env:PATH"
            npm run desktop:build
      - save_cache:
          key: win-cargo-target-v2-{{ checksum "src-tauri/Cargo.lock" }}
          paths:
            - src-tauri/target/release/deps
            - src-tauri/target/release/build
            - src-tauri/target/release/.fingerprint
      - run:
          name: Stage Windows artifacts
          command: |
            New-Item -ItemType Directory -Force -Path artifacts\windows | Out-Null
            Copy-Item src-tauri\target\release\bundle\nsis\*-setup.exe artifacts\windows\
            Copy-Item src-tauri\target\release\bundle\nsis\*-setup.exe.sig artifacts\windows\
            "windows-x86_64" | Out-File -Encoding ascii artifacts\windows\PLATFORM_ID
      - persist_to_workspace:
          root: artifacts
          paths:
            - windows

  build-macos:
    macos:
      xcode: "16.4.0"
    resource_class: m4pro.medium
    steps:
      - checkout
      - restore_cache:
          keys:
            - macos-rustup-v1
      - setup_rust
      - save_cache:
          key: macos-rustup-v1
          paths:
            - ~/.cargo
            - ~/.rustup
      - run:
          name: Use Node.js 20
          command: |
            if command -v node >/dev/null 2>&1; then
              node --version
            else
              brew install node@20
              echo 'export PATH="/opt/homebrew/opt/node@20/bin:$PATH"' >> "$BASH_ENV"
            fi
            npm --version
      - run:
          name: Install universal Rust targets
          command: |
            rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - restore_cache:
          keys:
            - macos-npm-{{ checksum "package-lock.json" }}
            - macos-npm-
      - run:
          name: Install dependencies
          command: npm ci --no-audit --no-fund
      - run:
          name: Check text encoding
          command: npm run check:text
      - save_cache:
          key: macos-npm-{{ checksum "package-lock.json" }}
          paths:
            - node_modules
      - run:
          name: Verify updater signing key
          command: node scripts/ci/prepare-tauri-signing.mjs
      - run:
          name: Configure ad-hoc macOS signing
          command: |
            node -e "const fs=require('node:fs'); const file='src-tauri/tauri.conf.json'; const conf=JSON.parse(fs.readFileSync(file,'utf8')); conf.bundle ||= {}; conf.bundle.macOS ||= {}; conf.bundle.macOS.signingIdentity='-'; fs.writeFileSync(file, JSON.stringify(conf, null, 2) + '\n');"
      - restore_cache:
          keys:
            - macos-cargo-target-v2-{{ checksum "src-tauri/Cargo.lock" }}
            - macos-cargo-target-v2-
      - run:
          name: Build macOS universal dev package
          no_output_timeout: 30m
          command: |
            npm run desktop:build-macos-dev
      - save_cache:
          key: macos-cargo-target-v2-{{ checksum "src-tauri/Cargo.lock" }}
          paths:
            - src-tauri/target/release/deps
            - src-tauri/target/release/build
            - src-tauri/target/release/.fingerprint
            - src-tauri/target/universal-apple-darwin/release/deps
            - src-tauri/target/universal-apple-darwin/release/build
            - src-tauri/target/universal-apple-darwin/release/.fingerprint
      - run:
          name: Stage macOS artifacts
          command: |
            set -e
            mkdir -p artifacts/macos
            BUNDLE=src-tauri/target/universal-apple-darwin/release/bundle
            SIG=$(find "$BUNDLE" -name "*.sig" | head -1)
            TARGET="${SIG%.sig}"
            cp "$SIG" "$TARGET" artifacts/macos/
            DMG=$(find "$BUNDLE" -name "*.dmg" | head -1)
            if [ -n "$DMG" ]; then cp "$DMG" artifacts/macos/; fi
            echo "darwin-aarch64,darwin-x86_64" > artifacts/macos/PLATFORM_ID
      - persist_to_workspace:
          root: artifacts
          paths:
            - macos

  publish-gitee:
    docker:
      - image: cimg/node:20.19.0
    steps:
      - checkout
      - attach_workspace:
          at: artifacts
      - run:
          name: Install dependencies
          command: npm ci --no-audit --no-fund
      - run:
          name: Check text encoding
          command: npm run check:text
      - run:
          name: Publish to Gitee
          no_output_timeout: 45m
          command: npm run release:gitee
          environment:
            ARTIFACTS_DIR: artifacts
            GITHUB_TOKEN: ${GITHUB_TOKEN}
            GITHUB_REPO: ${GITHUB_REPO}

workflows:
  release:
    when: << pipeline.parameters.run_release >>
    jobs:
      - build-windows
      - build-macos
      - publish-gitee:
          requires:
            - build-windows
            - build-macos
